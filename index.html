<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز الطارق | تسجيل الدخول</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body>
    <main class="login">
        <div class="login-container">

            <div class="login-card">
                <header class="login-header">
                    <div class="login-logo">
                        <img src="" alt="logo">
                    </div>
                    <h1 class="login-title"> مركز الطارق </h1>
                    <p class="login-subtitle"> نظام إدارة مركز الطارق </p>
                </header>
                <form class="login-form" action="" method="POST">
                    <div class="input-group">
                        <label for="username">اسم المستخدم</label>
                        <input type="text" id="username" name="username" placeholder="أدخل اسم المستخدم"
                            autocomplete="username" required>
                        <small id="username-error"></small>
                    </div>
                    <div class="input-group">
                        <label for="password">كلمة المرور</label>

                        <div class="password-wrapper">
                            <input type="password" id="password" name="password" placeholder="أدخل كلمة المرور"
                                autocomplete="current-password">

                            <!-- ✅ تعديل الزر: إزالة 👁 واستخدام أيقونة Bootstrap -->
                            <button type="button" class="toggle-password" aria-label="إظهار كلمة المرور">
                                <i class="bi bi-eye" id="toggle-icon"></i>
                            </button>

                            <small id="password-error"></small>
                        </div>
                        <div class="remember-me">
                            <input type="checkbox" name="" id="checkbox">
                            <label for="checkbox"> تذكرني </label>
                        </div>

                        <small class="error-message" id="login-error"></small>

                        <button class="login-btn" type="submit">
                            تسجيل الدخول
                        </button>

                </form>
                <footer class="login-footer">
                    الحقوق محفوظة مركز الطارق للعلاج الطبيعي
                </footer>
            </div>

        </div>

    </main>
    <script src="login.js"></script>
</body>

</html>
