<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>doctor Dashboard</title>
</head>

<body>


    <main class="dashboard doctor-dashboard">
        <section class="dashboard-content">
            <header class="topbar">


                <div class="topbar-left">
                    <h1> المرضى</h1>
                </div>

                <div class="topbar-right">
                    <button class="notification-btn">

                        <i class="bi bi-bell"></i>

                    </button>

                    <div class="profile">

                        <i class="bi bi-person-circle"></i>

                        <span>د. أحمد</span>

                    </div>

                </div>
            </header>
            <section class="main-content"></section>
            <section class="quick-search">

                <div class="quick-search-header">

                    <h2>البحث عن المرضى</h2>


                </div>

                <div class="search-wrapper">

                    <i class="bi bi-search"></i>

                    <input type="search" id="patient-search" placeholder="ابحث بالاسم أو رقم الهاتف أو رقم الملف">

                </div>

            </section>
            <section class="patients-list">

                  <header class="section-header">

                    <h2>قائمة المرضى</h2>

                    <span class="patients-count">

                        إجمالي المرضى : 25

                    </span>

                </header>

                <div class="table-wrapper">

                    <table class="dashboard-table patients-table">

                        <thead>

                            <tr>

                                <th>رقم الملف</th>
                                <th>اسم المريض</th>
                                <th>رقم الهاتف</th>
                                <th>آخر جلسة</th>
                                <th>الحالة</th>
                                <th>الإجراء</th>

                            </tr>

                        </thead>

                        <tbody id="patients-table-body">

                            <tr>

                                <td>#1001</td>

                                <td>محمد أحمد</td>

                                <td>01012345678</td>

                                <td>03 / 07 / 2026</td>

                                <td>

                                    <span class="status active">

                                        نشط

                                    </span>

                                </td>

                                <td>

                                    <button class="primary-btn open-patient-btn" type="button">

                                        فتح الملف

                                    </button>

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </section>

            </section>

        </section>



    </main>



    <script src="doctor.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
